<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedDoc Parser</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F5F0;
    --surface: #FFFFFF;
    --border: #E2DDD5;
    --text: #1A1814;
    --muted: #7A7570;
    --accent: #1D6A4A;
    --accent-light: #E1F5EE;
    --accent-mid: #9FE1CB;
    --danger: #C0392B;
    --danger-light: #FCEBEB;
    --warn: #BA7517;
    --warn-light: #FAEEDA;
    --radius: 12px;
    --radius-sm: 8px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1.25rem 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .logo-mark {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }

  .logo-mark svg { width: 20px; height: 20px; fill: white; }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.35rem;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  header span {
    font-size: 0.8rem;
    color: var(--muted);
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 2px 10px;
    border-radius: 20px;
    margin-left: auto;
  }

  main {
    display: grid;
    grid-template-columns: 420px 1fr;
    gap: 0;
    height: calc(100vh - 65px);
  }

  .panel {
    padding: 2rem;
    overflow-y: auto;
  }

  .left-panel {
    background: var(--surface);
    border-right: 1px solid var(--border);
  }

  .right-panel { background: var(--bg); }

  .section-label {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.75rem;
  }

  .type-selector {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 1.75rem;
  }

  .type-btn {
    border: 1.5px solid var(--border);
    background: var(--surface);
    border-radius: var(--radius-sm);
    padding: 0.85rem 1rem;
    cursor: pointer;
    transition: all 0.18s;
    text-align: left;
  }

  .type-btn:hover { border-color: var(--accent-mid); background: var(--accent-light); }

  .type-btn.active {
    border-color: var(--accent);
    background: var(--accent-light);
  }

  .type-btn .icon {
    width: 28px; height: 28px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 0.5rem;
    font-size: 14px;
  }

  .type-btn.active .icon { background: var(--accent); }
  .type-btn:not(.active) .icon { background: var(--border); }

  .type-btn .btn-title {
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--text);
    display: block;
  }

  .type-btn .btn-sub {
    font-size: 0.72rem;
    color: var(--muted);
    display: block;
    margin-top: 2px;
  }

  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 2.5rem 1.5rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 1.5rem;
    position: relative;
  }

  .drop-zone:hover, .drop-zone.dragover {
    border-color: var(--accent);
    background: var(--accent-light);
  }

  .drop-zone input[type="file"] {
    position: absolute; inset: 0;
    opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }

  .drop-icon {
    width: 44px; height: 44px;
    background: var(--bg);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 1rem;
    font-size: 20px;
  }

  .drop-zone p { font-size: 0.85rem; color: var(--muted); line-height: 1.5; }
  .drop-zone strong { color: var(--text); font-weight: 500; }

  .file-chip {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--accent-light);
    border: 1px solid var(--accent-mid);
    border-radius: var(--radius-sm);
    padding: 0.7rem 1rem;
    margin-bottom: 1.5rem;
    font-size: 0.83rem;
  }

  .file-chip .fname { font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-chip .fsize { color: var(--muted); font-size: 0.75rem; }
  .file-chip button { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 18px; line-height: 1; padding: 0; }

  .submit-btn {
    width: 100%;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    padding: 0.85rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .submit-btn:hover { background: #165c3e; }
  .submit-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .results-empty {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    color: var(--muted);
    text-align: center;
  }

  .results-empty .big-icon {
    font-size: 48px;
    opacity: 0.3;
  }

  .results-empty p { font-size: 0.85rem; }

  .results-grid {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .result-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1.25rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }

  .result-badge {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 20px;
    background: var(--accent-light);
    color: var(--accent);
    border: 1px solid var(--accent-mid);
  }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .result-card .card-label {
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0.65rem 1rem;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }

  .result-card .card-value {
    padding: 0.9rem 1rem;
    font-size: 0.88rem;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .null-chip {
    color: var(--muted);
    font-style: italic;
    font-size: 0.82rem;
  }

  .error-box {
    background: var(--danger-light);
    border: 1px solid #F7C1C1;
    border-radius: var(--radius-sm);
    padding: 1rem;
    color: var(--danger);
    font-size: 0.85rem;
  }

  .api-url-row {
    display: flex;
    gap: 8px;
    margin-bottom: 1.75rem;
    align-items: center;
  }

  .api-url-row input {
    flex: 1;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0.55rem 0.85rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    color: var(--text);
    background: var(--surface);
    outline: none;
  }

  .api-url-row input:focus { border-color: var(--accent); }
</style>
</head>
<body>

<header>
  <div class="logo-mark">
    <svg viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
  </div>
  <h1>MedDoc Parser</h1>
  <span>FastAPI Backend</span>
</header>

<main>
  <div class="panel left-panel">

    <p class="section-label">API Endpoint</p>
    <div class="api-url-row">
      <input type="text" id="api-url" value="http://127.0.0.1:8000/extract_from_doc" />
    </div>

    <p class="section-label">Document Type</p>
    <div class="type-selector">
      <button class="type-btn active" data-type="prescription" onclick="selectType(this)">
        <div class="icon">💊</div>
        <span class="btn-title">Prescription</span>
        <span class="btn-sub">Doctor's Rx form</span>
      </button>
      <button class="type-btn" data-type="patient_details" onclick="selectType(this)">
        <div class="icon">🧾</div>
        <span class="btn-title">Patient Details</span>
        <span class="btn-sub">Medical record</span>
      </button>
    </div>

    <p class="section-label">Upload PDF</p>
    <div class="drop-zone" id="drop-zone">
      <input type="file" id="file-input" accept=".pdf" onchange="handleFile(this.files[0])">
      <div class="drop-icon">📄</div>
      <p><strong>Click to browse</strong> or drag & drop</p>
      <p style="margin-top:4px;">PDF files only</p>
    </div>

    <div id="file-chip" style="display:none;" class="file-chip">
      <span>📎</span>
      <span class="fname" id="file-name"></span>
      <span class="fsize" id="file-size"></span>
      <button onclick="clearFile()" title="Remove">×</button>
    </div>

    <button class="submit-btn" id="submit-btn" onclick="submitForm()" disabled>
      Extract Data
    </button>
  </div>

  <div class="panel right-panel" id="right-panel">
    <div class="results-empty" id="empty-state">
      <div class="big-icon">🔬</div>
      <p>Upload a PDF and click <strong>Extract Data</strong><br>to parse your medical document.</p>
    </div>
    <div id="results-area" style="display:none;"></div>
  </div>
</main>

<script>
  let selectedFile = null;
  let selectedType = 'prescription';

  const dropZone = document.getElementById('drop-zone');

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file && file.type === 'application/pdf') handleFile(file);
  });

  function selectType(btn) {
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedType = btn.dataset.type;
  }

  function handleFile(file) {
    if (!file) return;
    selectedFile = file;
    document.getElementById('file-chip').style.display = 'flex';
    document.getElementById('file-name').textContent = file.name;
    document.getElementById('file-size').textContent = (file.size / 1024).toFixed(1) + ' KB';
    document.getElementById('drop-zone').style.display = 'none';
    document.getElementById('submit-btn').disabled = false;
  }

  function clearFile() {
    selectedFile = null;
    document.getElementById('file-chip').style.display = 'none';
    document.getElementById('drop-zone').style.display = 'block';
    document.getElementById('file-input').value = '';
    document.getElementById('submit-btn').disabled = true;
  }

  function fieldLabel(key) {
    return key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  }

  async function submitForm() {
    if (!selectedFile) return;

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> Extracting…';

    const apiUrl = document.getElementById('api-url').value.trim();
    const formData = new FormData();
    formData.append('file', selectedFile);
    formData.append('file_format', selectedType);

    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('results-area').style.display = 'none';

    try {
      const res = await fetch(apiUrl, { method: 'POST', body: formData });
      const data = await res.json();

      const area = document.getElementById('results-area');
      area.style.display = 'block';

      if (data.error) {
        area.innerHTML = `<div class="error-box">⚠️ <strong>Error:</strong> ${data.error}</div>`;
      } else {
        const typeName = selectedType === 'prescription' ? 'Prescription' : 'Patient Details';
        let html = `<div class="result-header">
          <span class="result-badge">${typeName}</span>
          <span style="font-size:0.8rem;color:var(--muted);">Parsed from ${selectedFile.name}</span>
        </div><div class="results-grid">`;

        for (const [key, val] of Object.entries(data)) {
          html += `<div class="result-card">
            <div class="card-label">${fieldLabel(key)}</div>
            <div class="card-value">${val ? val : '<span class="null-chip">Not found</span>'}</div>
          </div>`;
        }

        html += '</div>';
        area.innerHTML = html;
      }
    } catch (err) {
      const area = document.getElementById('results-area');
      area.style.display = 'block';
      area.innerHTML = `<div class="error-box">⚠️ <strong>Could not connect to API.</strong><br>Make sure your FastAPI backend is running at <code>${apiUrl}</code></div>`;
    }

    btn.disabled = false;
    btn.innerHTML = 'Extract Data';
  }
</script>
</body>
</html>
